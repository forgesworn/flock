# flock CI — the fast gates that must pass before every deploy: lint → typecheck →
# build (lib + PWA) → unit tests with coverage. A separate `native` job runs the Kotlin publish
# pipeline's JVM suite (JDK 21, no Android SDK) — it holds the JS↔Kotlin wire-format
# parity, incl. the reverse gift-wrap check that proves Kotlin-built wraps decrypt
# through the untouched JS path. Action refs pinned by SHA, as across ForgeSworn.
#
# The two-person Playwright suite gets a fresh, RAM-only Nostr relay in CI. An
# explicit FLOCK_E2E_RELAY can still run the same suite against a production-
# shaped relay before deployment without making production traffic a push gate.
#
# Publishing (anvil) is deliberately absent: @forgesworn/flock is private and
# unpublished — wire forgesworn/anvil here if the library ever ships to npm.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Otherwise the workflow GITHUB_TOKEN extraheader overrides the
          # FORGESWORN_READ_PAT rewrite below and npm ci 404s on private deps.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      # flock depends on private @forgesworn git deps (mesh-kit, @forgesworn/flock,
      # covey-kit, roost-kit, …). npm normalises their git URLs to ssh://, so
      # rewrite all three github.com URL forms to inject a read-only PAT over HTTPS.
      # Requires repo secret FORGESWORN_READ_PAT (fine-grained, read-only).
      - name: Authenticate git for private @forgesworn deps
        env:
          FORGESWORN_READ_PAT: ${{ secrets.FORGESWORN_READ_PAT }}
        run: |
          AUTH="https://x-access-token:${FORGESWORN_READ_PAT}@github.com/"
          git config --global url."$AUTH".insteadOf "https://github.com/"
          git config --global --add url."$AUTH".insteadOf "ssh://git@github.com/"
          git config --global --add url."$AUTH".insteadOf "git@github.com:"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:app
      - run: npm run test:coverage

  # Kotlin native publish pipeline — golden-vector parity against the JS impl,
  # incl. the reverse stage (compatibility/v1/verify-kotlin.test.ts consumes the
  # kotlin-wraps.json this emits). JDK 21 only; no Android SDK. Kotlin and JS
  # run in this same job so the gitignored generated wraps cannot be skipped.
  native:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Otherwise the workflow GITHUB_TOKEN extraheader overrides the
          # FORGESWORN_READ_PAT rewrite below and npm ci 404s on private deps.
          persist-credentials: false
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: native/crypto-tests/**/*.gradle*
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      # flock depends on private @forgesworn git deps (mesh-kit, @forgesworn/flock,
      # covey-kit, roost-kit, …). npm normalises their git URLs to ssh://, so
      # rewrite all three github.com URL forms to inject a read-only PAT over HTTPS.
      # Requires repo secret FORGESWORN_READ_PAT (fine-grained, read-only).
      - name: Authenticate git for private @forgesworn deps
        env:
          FORGESWORN_READ_PAT: ${{ secrets.FORGESWORN_READ_PAT }}
        run: |
          AUTH="https://x-access-token:${FORGESWORN_READ_PAT}@github.com/"
          git config --global url."$AUTH".insteadOf "https://github.com/"
          git config --global --add url."$AUTH".insteadOf "ssh://git@github.com/"
          git config --global --add url."$AUTH".insteadOf "git@github.com:"
      - run: npm ci
      - run: ./gradlew --console=plain test
        working-directory: native/crypto-tests
      - run: npx vitest run compatibility/v1/verify-kotlin.test.ts

  e2e:
    # On-demand only. The two-person Playwright suite (many specs, software-WebGL
    # rendering, serial workers + 2 retries) exceeds the 45-min job budget on
    # every push and it belongs on the developer's machine (docs/DEPLOY.md) — so
    # run it via a manual `workflow_dispatch` (a fresh RAM-only relay is started
    # for it, see playwright.config.ts) rather than blocking every push/PR.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Otherwise the workflow GITHUB_TOKEN extraheader overrides the
          # FORGESWORN_READ_PAT rewrite below and npm ci 404s on private deps.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      # flock depends on private @forgesworn git deps (mesh-kit, @forgesworn/flock,
      # covey-kit, roost-kit, …). npm normalises their git URLs to ssh://, so
      # rewrite all three github.com URL forms to inject a read-only PAT over HTTPS.
      # Requires repo secret FORGESWORN_READ_PAT (fine-grained, read-only).
      - name: Authenticate git for private @forgesworn deps
        env:
          FORGESWORN_READ_PAT: ${{ secrets.FORGESWORN_READ_PAT }}
        run: |
          AUTH="https://x-access-token:${FORGESWORN_READ_PAT}@github.com/"
          git config --global url."$AUTH".insteadOf "https://github.com/"
          git config --global --add url."$AUTH".insteadOf "ssh://git@github.com/"
          git config --global --add url."$AUTH".insteadOf "git@github.com:"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
