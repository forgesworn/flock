<!doctype html>
<!-- Throwaway proof harness for the local vector PMTiles basemap (see basemap.ts).
     Served by the Vite dev server at /pmtiles-proof.html. Not a build entry. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>flock — PMTiles basemap proof</title>
    <style>html, body, #map { margin: 0; height: 100%; background: #0b0e12; }</style>
  </head>
  <body>
    <div id="map"></div>
    <script type="module">
      import maplibregl from 'maplibre-gl'
      import 'maplibre-gl/dist/maplibre-gl.css'
      import { registerPmtilesProtocol, pmtilesStyle, LOCAL_BASEMAP_URL } from './src/basemap.ts'

      window.__errs = []
      registerPmtilesProtocol()
      const map = new maplibregl.Map({
        container: 'map',
        style: pmtilesStyle(LOCAL_BASEMAP_URL),
        center: [-1.54, 53.99], // Harrogate
        zoom: 13.5,
      })
      window.__ready = false
      map.on('load', () => map.once('idle', () => { window.__ready = true }))
      map.on('error', (e) => { window.__errs.push(String(e && e.error ? e.error : e)) })
    </script>
  </body>
</html>
